name: Build APK Rodrigues Entregador V18

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK V18 sem Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle na nuvem
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Conferir estrutura e versao
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Workflows ativos:" && find .github/workflows -maxdepth 1 -type f -print || true
          echo "Gradle instalado:" && gradle --version
          echo "Versao declarada no Gradle:" && grep -n "versionCode\|versionName" app/build.gradle.kts
          echo "Arquivos da raiz:" && ls -la
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -d app

      - name: Garantir fonte Montserrat antes do build
        run: |
          mkdir -p app/src/main/res/font
          curl -L --retry 3 -o app/src/main/res/font/montserrat_regular.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-Regular.ttf
          curl -L --retry 3 -o app/src/main/res/font/montserrat_medium.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-Medium.ttf
          curl -L --retry 3 -o app/src/main/res/font/montserrat_semibold.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-SemiBold.ttf
          curl -L --retry 3 -o app/src/main/res/font/montserrat_bold.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-Bold.ttf
          curl -L --retry 3 -o app/src/main/res/font/montserrat_extrabold.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-ExtraBold.ttf
          curl -L --retry 3 -o app/src/main/res/font/montserrat_black.ttf https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-Black.ttf
          ls -lh app/src/main/res/font

      - name: Build Debug APK
        run: gradle --no-daemon clean :app:assembleDebug --rerun-tasks --stacktrace

      - name: Preparar APK com nome unico V18
        run: |
          mkdir -p build-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/Rodrigues-Entregador-V18-Gradle-Nuvem-UI-Polida-debug.apk
          ls -lh build-artifacts

      - name: Upload APK V18
        uses: actions/upload-artifact@v4
        with:
          name: Rodrigues-Entregador-V18-APK-GRADLE-NUVEM
          path: build-artifacts/Rodrigues-Entregador-V18-Gradle-Nuvem-UI-Polida-debug.apk
          if-no-files-found: error
