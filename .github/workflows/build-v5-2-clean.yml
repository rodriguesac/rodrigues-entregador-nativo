name: BUILD APK V5.2 CLEAN

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout atualizado
        uses: actions/checkout@v4

      - name: Setup Java 17 para rodar Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle sem cache antigo
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Conferir arquivos limpos
        run: |
          echo "===== app/src/main/java ====="
          find app/src/main/java -type f | sort
          echo "===== app/build.gradle.kts ====="
          cat app/build.gradle.kts

      - name: Build Debug APK limpo
        run: gradle --no-daemon clean :app:assembleDebug --rerun-tasks --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rodrigues-entregador-v5-2-clean-debug
          path: app/build/outputs/apk/debug/*.apk
